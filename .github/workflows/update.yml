name: Update Counter
on:
  repository_dispatch:
    types: [visit]
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Update visits
        run: |
          count=$(grep -oP '\d+' visits.json)
          new_count=$((count + 1))
          echo "{\"count\": $new_count}" > visits.json
          git config user.name "Counter Bot"
          git config user.email "bot@github.com"
          git add visits.json
          git commit -m "New visit: $new_count"
          git push
